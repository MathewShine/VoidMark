<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VoidMark — Watermark Remover</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container { width: 100%; max-width: 560px; padding: 20px; }

    .logo {
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: -2px;
      color: #fff;
      margin-bottom: 6px;
    }

    .logo span { color: #ff4d4d; }

    .tagline {
      font-size: 0.8rem;
      color: #555;
      margin-bottom: 40px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 32px;
    }

    .drop-zone {
      border: 2px dashed #333;
      border-radius: 8px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 20px;
      position: relative;
    }

    .drop-zone:hover, .drop-zone.active {
      border-color: #ff4d4d;
      background: #1a0a0a;
    }

    .drop-zone input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon { font-size: 2rem; margin-bottom: 10px; }
    .drop-text { color: #555; font-size: 0.85rem; }
    .drop-text strong { color: #aaa; display: block; margin-bottom: 4px; }
    .file-selected { color: #ff4d4d; font-size: 0.8rem; margin-top: 8px; }

    label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 1px;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 12px 16px;
      color: #f0f0f0;
      font-family: 'Courier New', monospace;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 24px;
    }

    input[type="text"]:focus { border-color: #ff4d4d; }

    button {
      width: 100%;
      background: #ff4d4d;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 14px;
      font-size: 1rem;
      font-family: 'Courier New', monospace;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #e03e3e; }
    button:disabled { background: #333; color: #555; cursor: not-allowed; }

    .progress { display: none; margin-top: 20px; }

    .progress-bar-bg {
      background: #1a1a1a;
      border-radius: 4px;
      height: 4px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .progress-bar {
      height: 100%;
      background: #ff4d4d;
      animation: indeterminate 1.5s infinite;
    }

    @keyframes indeterminate {
      0% { width: 0%; margin-left: 0%; }
      50% { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }

    .status {
      font-size: 0.75rem;
      color: #555;
      text-align: center;
      letter-spacing: 1px;
    }

    .result { display: none; margin-top: 20px; text-align: center; }

    .download-btn {
      display: inline-block;
      background: #1a1a1a;
      border: 1px solid #ff4d4d;
      color: #ff4d4d;
      padding: 12px 32px;
      border-radius: 6px;
      text-decoration: none;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .download-btn:hover { background: #ff4d4d; color: #fff; }

    .error {
      display: none;
      margin-top: 16px;
      color: #ff6b6b;
      font-size: 0.8rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Void<span>Mark</span></div>
    <div class="tagline">Text Watermark Remover</div>

    <div class="card">
      <div class="drop-zone" id="dropZone">
        <input type="file" id="videoInput" accept="video/*" />
        <div class="drop-icon">🎬</div>
        <div class="drop-text">
          <strong>Drop your video here</strong>
          MP4, MOV, AVI — up to 10 seconds
        </div>
        <div class="file-selected" id="fileName"></div>
      </div>

      <label for="watermarkText">Watermark Text to Remove</label>
      <input
        type="text"
        id="watermarkText"
        placeholder="e.g. @username or © copyright"
      />

      <button id="submitBtn" onclick="processVideo()">
        ⚡ Remove Watermark
      </button>

      <div class="progress" id="progress">
        <div class="progress-bar-bg">
          <div class="progress-bar"></div>
        </div>
        <div class="status" id="statusText">Processing your video...</div>
      </div>

      <div class="result" id="result">
        ✅ Done!<br/><br/>
        <a class="download-btn" id="downloadLink" href="#" download="voidmark_clean.mp4">
          ⬇ Download Clean Video
        </a>
      </div>

      <div class="error" id="errorMsg"></div>
    </div>
  </div>

  <script>
    const videoInput = document.getElementById('videoInput');
    const fileName = document.getElementById('fileName');
    const dropZone = document.getElementById('dropZone');

    videoInput.addEventListener('change', () => {
      if (videoInput.files[0]) {
        fileName.textContent = '✓ ' + videoInput.files[0].name;
      }
    });

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('active');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('active');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('active');
      if (e.dataTransfer.files[0]) {
        videoInput.files = e.dataTransfer.files;
        fileName.textContent = '✓ ' + e.dataTransfer.files[0].name;
      }
    });

    async function processVideo() {
      const file = videoInput.files[0];
      const text = document.getElementById('watermarkText').value.trim();

      if (!file) return alert('Please select a video file.');
      if (!text) return alert('Please enter the watermark text.');

      const btn = document.getElementById('submitBtn');
      const progress = document.getElementById('progress');
      const result = document.getElementById('result');
      const errorMsg = document.getElementById('errorMsg');

      btn.disabled = true;
      progress.style.display = 'block';
      result.style.display = 'none';
      errorMsg.style.display = 'none';

      const formData = new FormData();
      formData.append('video', file);
      formData.append('watermark_text', text);

      try {
        const response = await fetch('http://localhost:8080/remove-watermark', {
          method: 'POST',
          body: formData
        });

        if (!response.ok) throw new Error('Server returned an error');

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        document.getElementById('downloadLink').href = url;

        progress.style.display = 'none';
        result.style.display = 'block';

      } catch (err) {
        progress.style.display = 'none';
        errorMsg.textContent = '❌ ' + err.message + ' — Make sure backend is running on port 8000.';
        errorMsg.style.display = 'block';
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
